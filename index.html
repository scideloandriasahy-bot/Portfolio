<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joseph Richardson | Portfolio Ingénieur</title>
    <meta name="description" content="Portfolio de Joseph Richardson, étudiant ingénieur spécialisé en électronique, automatique et robotique.">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo">ANDRIASAHY Tsikomia Scidelo</a>
                <ul class="nav-links">
                    <li><a href="#about">À propos</a></li>
                    <li><a href="#projects">Projets</a></li>
                    <li><a href="#experience">Expériences</a></li>
                    <li><a href="#cv">CV</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero" class="container hero fade-in">
            <div class="hero-content" id="hero-content">
                <!-- Data will be injected here -->
            </div>
            <div class="hero-image" id="hero-image" style="width: 216px; height: 216px;">
                <img src="assets/images/profile.jpg" alt="ANDRIASAHY Tsikomia Scidelo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
            </div>
        </section>

        <section id="about" class="container fade-in">
            <h2 class="section-title">À propos</h2>
            <div id="about-text"></div>
        </section>

        <section id="projects" class="container fade-in">
            <h2 class="section-title">Projets</h2>
            <div class="grid" id="projects-grid">
                <!-- Projects go here -->
            </div>
        </section>

        <section id="experience" class="container fade-in">
            <h2 class="section-title">Expériences & Engagements</h2>
            <div class="timeline" id="experience-timeline">
                <!-- Experiences go here -->
            </div>
        </section>

        <section id="cv" class="container fade-in">
            <h2 class="section-title">Parcours & CV</h2>
            <div class="timeline" id="education-timeline">
                <!-- Education goes here -->
            </div>
            <div style="margin-top: 3rem; text-align: center;">
                <a href="assets/pdfs/CV_Joseph_Richardson.pdf" class="btn" download>Télécharger mon CV (PDF)</a>
            </div>
        </section>

        <section id="certificates" class="container fade-in">
            <h2 class="section-title">Certificats</h2>
            <div class="grid" id="certificates-grid">
                <!-- Certificates go here -->
            </div>
        </section>
    </main>

    <footer class="container" style="padding: 4rem 0; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-muted); font-size: 0.9rem;">
        <p>&copy; 2026 ANDRIASAHY Tsikomia Scidelo. Conçu avec excellence.</p>
    </footer>

    <!-- Overlay for Project Details -->
    <div id="project-modal" class="modal" style="display:none; position: fixed; inset:0; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; padding: 2rem;">
        <div class="modal-content container" style="background: var(--bg-color); border-radius: 12px; padding: 3rem; margin-top: 5vh; min-height: 80vh; position: relative;">
            <button id="close-modal" style="position: sticky; top: 0; left: 100%; background: none; border: none; font-size: 2rem; color: var(--text-color); cursor: pointer;">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="scripts/app.js"></script>
</body>
</html>
